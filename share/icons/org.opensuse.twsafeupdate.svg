         stroke-linecap="round" stroke-linejoin="round">
        <path d="m 459.43065,27.956027 c 0,0 1.88115,-6.3091 4.87343,-8.72062 0.34698,8.73663 11.48102,5.67335 8.93415,-2.16085 15.40527,-1.15318 27.44191,5.8355 31.61378,14.34007 6.03681,8.21245 4.25829,17.92849 4.68825,22.60205 -10.46313,6.96073 -19.48193,0.42298 -23.40887,-6.21798 0.043,6.65547 7.09455,15.61642 17.55665,12.80172 -5.8956,3.65622 -12.858,5.44219 -19.48136,4.95114"/>
        <circle cx="495.18384" cy="37.282753" r="10.698378" stroke-width="2.6"/>
        <path d="m 495.17798,37.509634 c -0.0739,0.716764 -6.9964,3.436097 -7.06842,-0.456468 -0.0746,-4.033717 7.15298,-0.363671 7.06842,0.456468 z" stroke-width="2.2"/>
        <path d="m 495.21816,37.314398 c 0.0739,0.716765 6.9964,3.436097 7.06842,-0.456468 0.0746,-4.033717 -7.15298,-0.363671 -7.06842,0.456468 z" stroke-width="2.2"/>
      </g>
