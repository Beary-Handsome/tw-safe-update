name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rpm:
    runs-on: ubuntu-latest
    container: opensuse/tumbleweed:latest
    steps:
      - name: Install build dependencies
        run: |
          zypper --non-interactive --gpg-auto-import-keys refresh
          zypper --non-interactive install --no-recommends \
            git tar gzip rpm-build rpm-sign gpg2 cmake gcc-c++ extra-cmake-modules \
            "cmake(Qt6Widgets)" "cmake(Qt6DBus)" \
            "cmake(KF6StatusNotifierItem)" "cmake(KF6Parts)"

      - uses: actions/checkout@v4

      - name: Build the RPM
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          version=$(rpmspec -q --qf '%{version}\n' packaging/tw-safe-update.spec | head -1)
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          git archive --prefix="tw-safe-update-${version}/" \
            -o ~/rpmbuild/SOURCES/tw-safe-update-${version}.tar.gz HEAD
          cp packaging/tw-safe-update.spec ~/rpmbuild/SPECS/
          rpmbuild --define "_topdir $HOME/rpmbuild" -ba ~/rpmbuild/SPECS/tw-safe-update.spec
          mkdir -p out
          cp ~/rpmbuild/RPMS/*/*.rpm ~/rpmbuild/SRPMS/*.rpm out/
          ls -l out

      - name: Run the offline tests
        run: bash tests/run-tests.sh

      - name: Sign the RPMs
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "No GPG_PRIVATE_KEY secret set — leaving packages unsigned."
            exit 0
          fi
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          name=$(gpg --list-secret-keys --with-colons | awk -F: '/^uid:/{print $10; exit}')
          printf '%%_gpg_name %s\n' "$name" > ~/.rpmmacros
          rpmsign --addsign out/*.rpm
          rpm --import RPM-GPG-KEY-tw-safe-update
          rpm --checksig out/*.rpm

      - name: Upload the packages
        uses: actions/upload-artifact@v4
        with:
          name: rpms
          path: out/*.rpm

      - name: Attach to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.rpm
