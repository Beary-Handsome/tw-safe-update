<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <rect x="5" y="5" width="150" height="150" rx="32" fill="#73ba25"/>

  <!-- update ring, counter-clockwise, arrowhead rising into the gap -->
  <path d="M80 22.5a57.5 57.5 0 1 0 57.5 57.5" fill="none" stroke="#ffffff"
        stroke-width="10" stroke-linecap="round"/>
  <path d="M122.5 83h30l-15-26z" fill="#ffffff"/>

  <!-- geeko head (derived; original transform stack kept, one copy only).
       The eye and the tumbleweed pupils use a thinner stroke than the head
       outline so the swirl stays readable instead of fusing solid. -->
